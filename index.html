<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asunción Transfers | Traslados Privados y Premium en Paraguay</title>
<meta name="description" content="Traslados privados en Asunción y Paraguay. Transfer aeropuerto Silvio Pettirossi, transporte ejecutivo y turismo premium.">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
html{scroll-behavior:smooth}
body{background:#000;color:#fff;line-height:1.6}

/* HEADER */
header{position:fixed;top:0;width:100%;padding:15px 40px;background:rgba(0,0,0,.9);display:flex;justify-content:space-between;align-items:center;z-index:1000}
nav{display:flex;align-items:center}
nav a{color:#fff;text-decoration:none;margin-left:18px;font-size:14px;cursor:pointer}
.menu-toggle{display:none;flex-direction:column;cursor:pointer}
.menu-toggle span{height:3px;width:26px;background:#fff;margin:4px 0}

/* HERO */
.hero{
  min-height:100vh;
  background:url("sedan-premium.jpg") no-repeat center center;
  background-size:cover;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  text-align:center;
  padding:0 20px;
}
.hero::after{
  content:"";
  position:absolute;
  top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.45); /* capa para destacar texto */
  z-index:1;
}
.hero-content{
  position:relative;
  z-index:2;
  max-width:600px;
}
.hero-content h1{font-size:48px;margin-bottom:15px}
.hero-content p{font-size:20px;margin-bottom:30px}
.btn{background:#25D366;color:#000;padding:12px 28px;border-radius:30px;font-weight:bold;text-decoration:none;display:inline-block;margin-top:15px}

/* SECTIONS */
section{padding:90px 40px;scroll-margin-top:120px}
section h2{text-align:center;font-size:36px;margin-bottom:50px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:30px}

/* CARD */
.card{background:#111;padding:35px 30px;border-radius:18px;text-align:center}
.card h3{margin:15px 0}

/* FLOTA */
.flota-icon{font-size:14px;letter-spacing:2px;font-weight:bold;color:#25D366;margin-bottom:10px}

/* FORM */
.form-box{max-width:520px;margin:auto;display:flex;flex-direction:column;gap:15px}
.form-box input,.form-box textarea{padding:12px;border-radius:10px;border:none}

/* FEATURES */
.features{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:25px;text-align:center}

/* SOCIAL */
.socials a{margin:0 12px;color:#25D366;text-decoration:none}

/* FOOTER */
footer{background:#050505;text-align:center;padding:40px 20px}

/* WHATSAPP FLOAT */
.whatsapp-float{position:fixed;bottom:20px;right:20px;background:#25D366;color:#000;width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;text-decoration:none;z-index:2000}

/* MOBILE */
@media(max-width:768px){
  header{padding:15px 20px}
  nav{position:fixed;top:0;left:-100%;width:100%;height:100vh;background:#000;flex-direction:column;justify-content:center;align-items:center;transition:.3s}
  nav.active{left:0}
  nav a{margin:18px 0;font-size:18px}
  .menu-toggle{display:flex}

  .hero{
    height:100vh;
    padding:0 20px;
    background-position:center center;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .hero-content h1{font-size:32px}
  .hero-content p{font-size:16px}
}
</style>
</head>
<body>
<header>
<div class="logo">Asunción Transfers</div>
<div class="menu-toggle" onclick="toggleMenu()"><span></span><span></span><span></span></div>
<nav id="menu">
<a data-i18n="menu_inicio" href="#inicio" onclick="closeMenu()">Inicio</a>
<a data-i18n="menu_servicios" href="#servicios" onclick="closeMenu()">Servicios</a>
<a data-i18n="menu_destinos" href="#destinos" onclick="closeMenu()">Destinos</a>
<a data-i18n="menu_flota" href="#flota" onclick="closeMenu()">Vehículos</a>
<a data-i18n="menu_porque" href="#porque" onclick="closeMenu()">Por qué elegirnos</a>
<a data-i18n="menu_reserva" href="#reserva" onclick="closeMenu()">Reserva</a>
<a data-i18n="menu_contacto" href="#contacto" onclick="closeMenu()">Contacto</a>
<a onclick="setLang('es')">ES</a>
<a onclick="setLang('en')">EN</a>
<a onclick="setLang('pt')">PT</a>
</nav>
</header>

<section class="hero" id="inicio">
<div class="hero-content">
<h1 data-i18n="hero_title">Traslados Privados en Asunción</h1>
<p data-i18n="hero_text">Servicio privado y profesional en Paraguay y el exterior.</p>
<a class="btn" href="https://wa.me/595991809877" target="_blank" data-i18n="cotizar">Cotizar</a>
</div>
</section>

<!-- resto de secciones igual que tu código original -->

<footer>
<p>© 2026 Asunción Transfers</p>
</footer>

<a class="whatsapp-float" href="https://wa.me/595991809877">💬</a>

<script>
const menu=document.getElementById("menu")
function toggleMenu(){menu.classList.toggle("active")}
function closeMenu(){menu.classList.remove("active")}

document.getElementById("formReserva")?.addEventListener("submit",function(e){
e.preventDefault()
let nombre=document.getElementById("nombre").value
let pasajeros=document.getElementById("pasajeros").value
let maletas=document.getElementById("maletas").value
let origen=document.getElementById("origen").value
let destino=document.getElementById("destino").value
let fecha=document.getElementById("fecha").value
let mensaje=document.getElementById("mensaje").value
let texto="Hola quiero reservar un traslado:%0A"+
"Nombre: "+nombre+"%0A"+
"Pasajeros: "+pasajeros+"%0A"+
"Maletas: "+maletas+"%0A"+
"Origen: "+origen+"%0A"+
"Destino: "+destino+"%0A"+
"Fecha: "+fecha+"%0A"+
"Mensaje: "+mensaje
window.open("https://wa.me/595991809877?text="+texto,"_blank")
})

// Multi idioma
const translations = {
"es": {},
"en": {"menu_inicio":"Home","menu_servicios":"Services","menu_destinos":"Destinations","menu_flota":"Vehicles","menu_porque":"Why choose us","menu_reserva":"Booking","menu_contacto":"Contact",
"hero_title":"Private Transfers in Asunción","hero_text":"Professional and private service in Paraguay and abroad","cotizar":"Get Quote"},
"pt": {"menu_inicio":"Início","menu_servicios":"Serviços","menu_destinos":"Destinos","menu_flota":"Veículos","menu_porque":"Por que nos escolher","menu_reserva":"Reserva","menu_contacto":"Contato",
"hero_title":"Traslados Privados em Assunção","hero_text":"Serviço privado e profissional no Paraguai e exterior","cotizar":"Solicitar"}
};

function setLang(lang){
document.querySelectorAll("[data-i18n]").forEach(el=>{
let key=el.getAttribute("data-i18n");
if(lang==="es"){el.textContent = el.getAttribute("data-i18n-default") || el.textContent;}
else if(translations[lang] && translations[lang][key]){el.textContent=translations[lang][key];}
});
}
document.querySelectorAll("[data-i18n]").forEach(el=>{el.setAttribute("data-i18n-default", el.textContent);});
</script>
</body>
</html>
